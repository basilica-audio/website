<!DOCTYPE html>
<html lang="{{html_lang}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{extra_head}}<title>{{title}}</title>
<meta name="description" content="{{description}}">
{{hreflang_tags}}
<link rel="stylesheet" href="{{root}}assets/css/style.css">
<link rel="icon" type="image/png" href="{{root}}assets/org.png">
</head>
<body data-org="{{org}}">
<a class="skip-link" href="#main">{{skip_link}}</a>
<header class="site-header">
  <a class="brand" href="{{root}}index.html">
    <img src="{{root}}assets/org.png" alt="" width="36" height="36">
    <span>{{brand_name}}</span>
  </a>
  <div class="header-nav-group">
    <nav class="site-nav" aria-label="Site">
      <a href="{{root}}index.html#plugins">{{nav_plugins}}</a>
      <a href="https://github.com/{{org}}" rel="noopener">{{nav_github}}</a>
    </nav>
    {{lang_switch}}
  </div>
</header>
<main id="main">
{{content}}
</main>
<footer class="site-footer">
  <div class="hairline" role="presentation"></div>
  <p class="footer-brand">Basilica Audio</p>
  <p class="footer-links">
    <a href="https://github.com/{{org}}" rel="noopener">GitHub</a>
    <span aria-hidden="true">·</span>
    <a href="https://www.gnu.org/licenses/agpl-3.0" rel="noopener">AGPL-3.0</a>
  </p>
  <p class="footer-note">{{footer_note}}</p>
</footer>
</body>
</html>
